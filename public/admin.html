<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBA AlmaU Impact Forum — Admin</title>
<link rel="icon" href="/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #38bdf8; font-size: 22px; margin-bottom: 2px; }
  .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }

  .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
  .card h2 { font-size: 15px; color: #38bdf8; margin-bottom: 12px; }

  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 3px; }
  input, textarea { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 10px; }
  input:focus, textarea:focus { outline: none; border-color: #38bdf8; }
  textarea { min-height: 50px; resize: vertical; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
  .btn-primary { background: #0ea5e9; color: #0f172a; width: 100%; justify-content: center; }
  .btn-primary:hover { background: #38bdf8; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
  .btn-outline:hover { border-color: #38bdf8; color: #38bdf8; }
  .btn-green { background: #10b981; color: #fff; }
  .btn-green:hover { background: #34d399; }
  .btn-red { background: #ef4444; color: #fff; }
  .btn-red:hover { background: #f87171; }
  .btn-orange { background: #f59e0b; color: #0f172a; }
  .btn-orange:hover { background: #fbbf24; }
  .btn-purple { background: #8b5cf6; color: #fff; width: 100%; }
  .btn-purple:hover { background: #a78bfa; }
  .btn-purple:disabled { opacity: .5; cursor: not-allowed; }

  .session { background: #0f172a; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .session .info { flex: 1; min-width: 0; }
  .session .title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session .meta { font-size: 12px; color: #64748b; margin-top: 2px; }
  .session .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .badge-green { background: #064e3b; color: #6ee7b7; }
  .badge-gray { background: #334155; color: #94a3b8; }

  .pw-bar { display: flex; gap: 10px; align-items: end; }
  .pw-bar input { margin-bottom: 0; flex: 1; }
  .pw-bar .btn { width: auto; flex-shrink: 0; }

  .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
  .msg-ok { display: block; background: #064e3b; color: #6ee7b7; }
  .msg-err { display: block; background: #7f1d1d; color: #fca5a5; }

  .hidden { display: none !important; }
  .empty { color: #64748b; font-size: 13px; text-align: center; padding: 20px; }
  .stat { font-size: 12px; color: #64748b; margin-bottom: 10px; }
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .confirm-box { background: #1e293b; border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; text-align: center; }
  .confirm-box p { margin-bottom: 16px; font-size: 14px; }
  .confirm-box .actions { display: flex; gap: 10px; justify-content: center; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-loading { pointer-events: none; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .card { padding: 14px; }
    .row { flex-direction: column; gap: 0; }
    .pw-bar { flex-direction: column; align-items: stretch; }
    .pw-bar .btn { width: 100%; }
    .session { flex-wrap: wrap; }
    .session .actions { width: 100%; justify-content: flex-end; padding-top: 6px; border-top: 1px solid #1e293b; }
    .confirm-box { width: 94%; padding: 18px; }
    .confirm-box .actions { flex-direction: column; }
    .confirm-box .actions .btn { width: 100%; }
    h1 { font-size: 18px; }
    .subtitle { font-size: 12px; }
    #insight_title { font-size: 13px; }
    #insight_block .actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>MBA AlmaU Impact Forum — Admin</h1>
  <p class="subtitle">MBA AlmaU Impact Forum — управление ботом</p>
  <div id="msg" class="msg"></div>

  <div class="card" id="login_card">
    <h2>Вход</h2>
    <div class="pw-bar">
      <input type="password" id="password" placeholder="Пароль администратора" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-primary" onclick="login()">Войти</button>
    </div>
  </div>

  <div id="main" class="hidden">
    <div class="stat" id="stats"></div>

    <div class="card">
      <h2>Создать пуш-опрос</h2>
      <div class="row">
        <div><label>ID сессии</label><input id="sid" value="session_"></div>
        <div><label>Название</label><input id="title" placeholder="Название доклада"></div>
      </div>
      <label>Вопрос участникам</label>
      <textarea id="question">Какие главные поинты вы выделили после этой встречи?</textarea>
      <button class="btn btn-primary" id="push_btn" onclick="createPush()">📢 Разослать опрос всем участникам</button>
    </div>

    <div class="card">
      <h2>🔔 Простая рассылка (информационная)</h2>
      <label>Текст сообщения</label>
      <textarea id="broadcast_msg" placeholder="Уважаемые участники, просим всех вернуться в зал..."></textarea>
      <label>Изображение (необязательно)</label>
      <input type="file" id="broadcast_img" accept="image/*" style="padding:6px; font-size:13px">
      <div id="broadcast_preview" style="display:none; margin-bottom:10px; max-width:200px">
        <img id="broadcast_preview_img" style="width:100%; border-radius:8px; border:1px solid #334155">
      </div>
      <button class="btn btn-purple" id="broadcast_btn" onclick="sendBroadcast()">🔔 Отправить уведомление всем</button>
    </div>

    <div class="card">
      <h2>Созданные опросы</h2>
      <div id="sessions"><div class="empty">Нажмите «Войти»</div></div>
    </div>

    <div id="insights_block" class="hidden">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px; flex-wrap:wrap; gap:6px">
          <h2 id="insight_title" style="margin-bottom:0">Ответы</h2>
          <div style="display:flex; gap:6px; flex-wrap:wrap">
            <button class="btn btn-sm btn-green" onclick="downloadExcel()">📥 Excel</button>
            <button class="btn btn-sm btn-outline" onclick="closeInsights()">✕ Закрыть</button>
          </div>
        </div>
        <div id="insight_list"></div>
      </div>
    </div>
  </div>
</div>

<div id="confirm" class="confirm-overlay hidden" onclick="if(event.target===this)hideConfirm()">
  <div class="confirm-box">
    <p id="confirm_text">Вы уверены?</p>
    <div class="actions">
      <button class="btn btn-sm btn-red" id="confirm_yes" onclick="">Да, удалить</button>
      <button class="btn btn-sm btn-outline" onclick="hideConfirm()">Отмена</button>
    </div>
  </div>
</div>

<script>
let PW = '';
const esc = s => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };

function msg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  setTimeout(() => el.className = 'msg', 5000);
}

function showConfirm(text, onYes) {
  document.getElementById('confirm_text').textContent = text;
  document.getElementById('confirm_yes').onclick = () => { hideConfirm(); onYes(); };
  document.getElementById('confirm').classList.remove('hidden');
}
function hideConfirm() { document.getElementById('confirm').classList.add('hidden'); }

function login() {
  PW = document.getElementById('password').value.trim();
  if (!PW) return msg('Введите пароль', false);
  document.getElementById('login_card').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  loadAll();
}

async function api(action, extra = {}) {
  const params = new URLSearchParams({ action, admin_password: PW, ...extra });
  const r = await fetch('/api/admin?' + params);
  return r.json();
}

async function apiPost(body) {
  const r = await fetch('/api/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ admin_password: PW, ...body })
  });
  return r.json();
}

async function loadAll() {
  await Promise.all([loadSessions(), loadStats()]);
}

async function loadStats() {
  try {
    const d = await api('list_sessions');
    if (!d.sessions) return;
    const total = d.sessions.length;
    const answers = d.sessions.reduce((s, x) => s + (x.insight_count || 0), 0);
    document.getElementById('stats').textContent = `📊 ${total} опросов · ${answers} ответов`;
  } catch (e) {}
}

function setLoading(btnId, loading, text) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> ' + (text || 'Отправка...');
  } else {
    btn.disabled = false;
    btn.textContent = text;
  }
}

async function createPush() {
  const sid = document.getElementById('sid').value.trim();
  const title = document.getElementById('title').value.trim();
  const question = document.getElementById('question').value.trim();
  if (!sid || !title) return msg('Заполните ID и название сессии', false);
  setLoading('push_btn', true);
  try {
    const d = await apiPost({ action: 'push_poll', session_id: sid, title, question });
    if (d.success) msg('✅ Разослано: ' + d.sent + ' из ' + d.total + ' участников', true);
    else msg('❌ ' + (d.error || 'Ошибка'), false);
    await loadAll();
  } catch (e) { msg('❌ Ошибка соединения: ' + e.message, false); }
  setLoading('push_btn', false, '📢 Разослать опрос всем участникам');
}

document.getElementById('broadcast_img').addEventListener('change', function() {
  const file = this.files[0];
  const preview = document.getElementById('broadcast_preview');
  if (!file) { preview.style.display = 'none'; return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('broadcast_preview_img').src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

async function sendBroadcast() {
  const msgText = document.getElementById('broadcast_msg').value.trim();
  if (!msgText) return msg('Напишите текст уведомления', false);
  const fileInput = document.getElementById('broadcast_img');
  setLoading('broadcast_btn', true);
  try {
    let image_base64 = '';
    if (fileInput.files && fileInput.files[0]) {
      const reader = new FileReader();
      image_base64 = await new Promise((resolve, reject) => {
        reader.onload = () => {
          const result = reader.result;
          const comma = result.indexOf(',');
          resolve(comma >= 0 ? result.substring(comma + 1) : result);
        };
        reader.onerror = () => reject(new Error('File read failed'));
        reader.readAsDataURL(fileInput.files[0]);
      });
    }
    const d = await apiPost({ action: 'broadcast', message: msgText, image_base64 });
    if (d.success) msg('✅ Уведомление отправлено: ' + d.sent + ' из ' + d.total + ' участников', true);
    else msg('❌ ' + (d.error || 'Ошибка'), false);
  } catch (e) { msg('❌ Ошибка: ' + e.message, false); }
  setLoading('broadcast_btn', false, '🔔 Отправить уведомление всем');
}

let currentSession = null;

async function loadSessions() {
  try {
    const d = await api('list_sessions');
    if (!d.success) return msg('Ошибка: ' + (d.error || ''), false);
    const el = document.getElementById('sessions');
    if (!d.sessions || d.sessions.length === 0) {
      el.innerHTML = '<div class="empty">Пока нет ни одного опроса. Создайте первый выше.</div>';
      return;
    }
    el.innerHTML = d.sessions.map(s => {
      const safeTitle = esc(s.title);
      const safeId = esc(s.session_id);
      return `
      <div class="session">
        <div class="info">
          <div class="title">${safeTitle} <span class="badge ${s.is_active ? 'badge-green' : 'badge-gray'}">${s.is_active ? 'Активен' : 'Завершён'}</span></div>
          <div class="meta">${safeId} · ${s.insight_count} ответов</div>
        </div>
        <div class="actions">
          <button class="btn btn-sm btn-outline" onclick="viewSession('${safeId}')">👁</button>
          <button class="btn btn-sm btn-red" onclick="confirmDelete('${safeId}','${esc(safeTitle)}')">🗑</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) { msg('Ошибка загрузки: ' + e.message, false); }
}

function confirmDelete(sid, title) {
  showConfirm('Удалить опрос «' + title + '» и все его ответы?', () => deleteSession(sid));
}

async function deleteSession(sid) {
  try {
    const d = await apiPost({ action: 'delete_session', session_id: sid });
    if (d.success && d.deleted) msg('🗑 Опрос удалён', true);
    else msg('Опрос не найден', false);
    if (currentSession === sid) closeInsights();
    await loadAll();
  } catch (e) { msg('Ошибка: ' + e.message, false); }
}

async function viewSession(sid) {
  currentSession = sid;
  try {
    const d = await api('get_insights', { session_id: sid });
    if (!d.success) return msg('Ошибка', false);
    document.getElementById('insights_block').classList.remove('hidden');
    document.getElementById('insight_title').textContent = '📊 ' + (d.session ? d.session.title : sid);
    const el = document.getElementById('insight_list');
    if (!d.insights || d.insights.length === 0) {
      el.innerHTML = '<div class="empty">Пока нет ответов на этот опрос</div>';
      return;
    }
    el.innerHTML = d.insights.map(n => {
      const name = esc(n.username || n.tg_id);
      const time = new Date(n.timestamp).toLocaleString();
      const insight = esc(n.raw_insight);
      return `
      <div class="session" style="display:block;padding:10px 14px">
        <div class="meta" style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span>${name}</span>
          <span>${time}</span>
        </div>
        <div style="font-size:14px">${insight}</div>
      </div>`;
    }).join('');
  } catch (e) { msg('Ошибка: ' + e.message, false); }
}

function closeInsights() {
  document.getElementById('insights_block').classList.add('hidden');
  currentSession = null;
}

function downloadExcel() {
  if (!currentSession) return;
  window.open('/api/admin?action=download_excel&session_id=' + encodeURIComponent(currentSession) + '&admin_password=' + encodeURIComponent(PW), '_blank');
}
</script>
</body>
</html>
