<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta-Harness Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #38bdf8; font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }

  .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
  .card h2 { font-size: 15px; color: #38bdf8; margin-bottom: 12px; }

  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 3px; }
  input, textarea, select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 10px; }
  input:focus, textarea:focus { outline: none; border-color: #38bdf8; }
  textarea { min-height: 50px; resize: vertical; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; }
  .btn-primary { background: #0ea5e9; color: #0f172a; width: 100%; }
  .btn-primary:hover { background: #38bdf8; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
  .btn-outline:hover { border-color: #38bdf8; color: #38bdf8; }
  .btn-green { background: #10b981; color: #fff; }
  .btn-green:hover { background: #34d399; }
  .btn-orange { background: #f59e0b; color: #0f172a; }
  .btn-orange:hover { background: #fbbf24; }

  .session { background: #0f172a; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .session .info { flex: 1; }
  .session .title { font-weight: 600; font-size: 14px; }
  .session .meta { font-size: 12px; color: #64748b; margin-top: 2px; }
  .session .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .badge-green { background: #064e3b; color: #6ee7b7; }
  .badge-gray { background: #334155; color: #94a3b8; }

  .insight { padding: 10px 12px; background: #0f172a; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
  .insight .head { display: flex; justify-content: space-between; color: #64748b; font-size: 11px; margin-bottom: 4px; }
  .insight .text { color: #e2e8f0; }

  .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
  .msg-ok { display: block; background: #064e3b; color: #6ee7b7; }
  .msg-err { display: block; background: #7f1d1d; color: #fca5a5; }

  .pw-bar { display: flex; gap: 10px; align-items: end; }
  .pw-bar input { margin-bottom: 0; }
  .pw-bar .btn { width: auto; flex-shrink: 0; }

  .hidden { display: none; }

  .empty { color: #64748b; font-size: 13px; text-align: center; padding: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>Meta-Harness</h1>
  <p class="subtitle">Управление ботом MBA AlmaU Impact Forum</p>

  <div id="msg" class="msg"></div>

  <!-- Логин -->
  <div class="card" id="login_card">
    <h2>Вход</h2>
    <div class="pw-bar">
      <input type="password" id="password" placeholder="Пароль администратора" style="flex:1">
      <button class="btn btn-primary" onclick="login()" style="width:auto">Войти</button>
    </div>
  </div>

  <!-- Основной интерфейс (после входа) -->
  <div id="main" class="hidden">

    <!-- Создать пуш -->
    <div class="card">
      <h2>Создать пуш-опрос</h2>
      <div class="row">
        <div><label>ID сессии</label><input id="sid" value="session_3" placeholder="session_3"></div>
        <div><label>Название</label><input id="title" placeholder="Название доклада"></div>
      </div>
      <label>Вопрос участникам</label>
      <textarea id="question">Какие главные поинты вы выделили после этой встречи?</textarea>
      <button class="btn btn-primary" onclick="createPush()">📢 Разослать опрос всем участникам</button>
    </div>

    <!-- Сессии -->
    <div class="card">
      <h2>Созданные опросы</h2>
      <div id="sessions"><div class="empty">Нажмите «Войти» чтобы загрузить</div></div>
    </div>

    <!-- Инсайты сессии -->
    <div id="insights_block" class="hidden">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px">
          <h2 id="insight_title" style="margin-bottom:0">Инсайты</h2>
          <div style="display:flex; gap:6px">
            <button class="btn btn-sm btn-green" onclick="downloadExcel()">📥 Скачать Excel</button>
            <button class="btn btn-sm btn-outline" onclick="closeInsights()">✕ Закрыть</button>
          </div>
        </div>
        <div id="insight_list"></div>
      </div>
    </div>

  </div>
</div>

<script>
let PW = '';

function msg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  setTimeout(() => el.className = 'msg', 4000);
}

function login() {
  PW = document.getElementById('password').value.trim();
  if (!PW) return msg('Введите пароль', false);
  document.getElementById('login_card').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  loadSessions();
}

async function api(action, extra = {}) {
  const params = new URLSearchParams({ action, admin_password: PW, ...extra });
  const r = await fetch('/api/admin?' + params);
  return r.json();
}

async function createPush() {
  const sid = document.getElementById('sid').value.trim();
  const title = document.getElementById('title').value.trim();
  const question = document.getElementById('question').value.trim();
  if (!sid || !title) return msg('Заполните ID и название сессии', false);
  const btn = document.querySelector('.card:first-of-type .btn-primary');
  btn.textContent = '⏳ Отправка...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'push_poll', admin_password: PW, session_id: sid, title, question })
    });
    const d = await r.json();
    if (d.success) msg('✅ Опрос разослан: ' + d.sent + ' из ' + d.total + ' участников', true);
    else msg('❌ ' + (d.error || 'Ошибка'), false);
    loadSessions();
  } catch (e) { msg('❌ ' + e.message, false); }
  btn.textContent = '📢 Разослать опрос всем участникам';
  btn.disabled = false;
}

let currentSession = null;

async function loadSessions() {
  try {
    const d = await api('list_sessions');
    if (!d.success) return msg('Ошибка загрузки: ' + (d.error || ''), false);
    const el = document.getElementById('sessions');
    if (!d.sessions || d.sessions.length === 0) {
      el.innerHTML = '<div class="empty">Пока нет ни одного опроса. Создайте первый выше.</div>';
      return;
    }
    el.innerHTML = d.sessions.map(s => `
      <div class="session">
        <div class="info">
          <div class="title">${s.title} <span class="badge ${s.is_active ? 'badge-green' : 'badge-gray'}">${s.is_active ? 'Активен' : 'Завершён'}</span></div>
          <div class="meta">${s.session_id} · ${s.insight_count} ответов</div>
        </div>
        <div class="actions">
          <button class="btn btn-sm btn-outline" onclick="viewSession('${s.session_id}')">👁 Ответы</button>
        </div>
      </div>
    `).join('');
  } catch (e) { msg('Ошибка: ' + e.message, false); }
}

async function viewSession(sid) {
  currentSession = sid;
  try {
    const d = await api('get_insights', { session_id: sid });
    if (!d.success) return msg('Ошибка', false);
    document.getElementById('insights_block').classList.remove('hidden');
    document.getElementById('insight_title').textContent = '📊 ' + (d.session ? d.session.title : sid);
    const el = document.getElementById('insight_list');
    if (!d.insights || d.insights.length === 0) {
      el.innerHTML = '<div class="empty">Пока нет ответов на этот опрос</div>';
      return;
    }
    el.innerHTML = d.insights.map(n => `
      <div class="insight">
        <div class="head"><span>${n.username || n.tg_id}</span><span>${new Date(n.timestamp).toLocaleString()}</span></div>
        <div class="text">${n.raw_insight}</div>
      </div>
    `).join('');
  } catch (e) { msg('Ошибка: ' + e.message, false); }
}

function closeInsights() {
  document.getElementById('insights_block').classList.add('hidden');
  currentSession = null;
}

function downloadExcel() {
  if (!currentSession) return;
  window.open('/api/admin?action=download_excel&session_id=' + encodeURIComponent(currentSession) + '&admin_password=' + encodeURIComponent(PW), '_blank');
}
</script>
</body>
</html>
